<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundBet</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1 class="logo">🎵 SoundBet</h1>
            <div class="header-controls">
                <button class="collection-toggle" id="collection-toggle">📁 Collection</button>
                <div class="currency-display">
                    <span class="music-notes">♪ 3000</span>
                    <span class="currency-label">Music Notes</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Collection Sidebar -->
    <div class="collection-sidebar" id="collection-sidebar">
        <div class="sidebar-header">
            <h2>Your Collection</h2>
            <button class="close-sidebar" id="close-sidebar">✕</button>
        </div>
        <div class="collection-scroll" id="collection-scroll">
            <!-- JavaScript will fill this automatically -->
        </div>
    </div>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Featured Wheel Game -->
        <section class="wheel-section">
            <h2 class="section-title">Spin the Wheel</h2>
            <div class="spin-cost">Cost: ♪ 100 per spin</div>
            <div class="game-container">
                <div class="wheel-display">
                    <div class="wheel">
                        <div class="wheel-segment legendary-bg">Legendary</div>
                        <div class="wheel-segment epic-bg">Epic</div>
                        <div class="wheel-segment rare-bg">Rare</div>
                        <div class="wheel-segment common-bg">Common</div>
                    </div>
                    <div class="wheel-pointer">▼</div>
                </div>
                <div class="game-controls">
                    <div class="plays-counter">Plays Remaining: 3</div>
                    <button class="spin-button" id="spin-button">SPIN NOW</button>
                    <button class="watch-ad-button" id="watch-ad-button">📺 Watch Ad for Extra Spin and 50 Music Notes</button>
                </div>
            </div>
        </section>

        <!-- Other Games -->
        <section class="other-games">
            <h2 class="section-title">More Games</h2>
            <div class="games-grid">
                <div class="game-card">
                    <h3>🎰 Slots</h3>
                    <p>Match 3 symbols to win songs</p>
                    <button class="play-button">Play Slots</button>
                </div>
                <div class="game-card">
                    <h3>🔴 Roulette</h3>
                    <p>Bet on your favorite genre</p>
                    <button class="play-button">Play Roulette</button>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>   
</body>
</html>
